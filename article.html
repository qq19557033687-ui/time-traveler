<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文章 · 时间旅人</title>
  <meta name="description" content="">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="js/renderer.js"></script>
</head>
<body class="grain">

  <div class="cursor-dot"></div>

  <header class="site-header">
    <div class="container-wide px-page">
      <div class="site-header-inner">
        <a href="index.html" class="logo-mark" data-magnetic>
          <span class="dot"></span>
          <span class="name">时间旅人</span>
        </a>
        <nav class="site-nav">
          <a href="index.html" class="link-underline" data-magnetic>文章</a>
          <a href="index.html#about" class="link-underline hidden-mobile" data-magnetic>关于</a>
        </nav>
      </div>
    </div>
  </header>

  <article class="article-page">
    <div class="container-wide px-page">
      <div class="reveal">
        <a href="index.html" class="back-link" data-magnetic>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="19" y1="12" x2="5" y2="12"></line>
            <polyline points="12 19 5 12 12 5"></polyline>
          </svg>
          返回文章列表
        </a>
      </div>

      <div class="article-header-grid">
        <div class="reveal article-header-left" data-delay="100">
          <div class="article-meta-row">
            <span id="article-category">随笔</span>
            <span class="dot-sep"></span>
            <span id="article-date">2026/06/28</span>
            <span class="dot-sep"></span>
            <span id="article-readtime">6 分钟</span>
          </div>
          <h1 class="article-title" id="article-title">加载中...</h1>
        </div>
        <div class="reveal article-header-right" data-delay="250">
          <p class="article-subtitle" id="article-subtitle"></p>
        </div>
      </div>
    </div>

    <div class="reveal article-cover">
      <img id="article-cover-img" src="" alt="" class="photo-mono">
    </div>

    <div id="article-body" class="article-body">
      <p>正在加载文章内容...</p>
    </div>
  </article>

  <!-- Related articles - dynamically filled by homepage renderer -->
  <section class="related-section" id="related-section">
    <div class="container-wide px-page section-pad">
      <div class="reveal related-header">
        <h2 class="related-title">继续阅读</h2>
        <a href="index.html" class="related-view-all" data-magnetic>
          <span class="link-underline">查看全部</span>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="5" y1="12" x2="19" y2="12"></line>
            <polyline points="12 5 19 12 12 19"></polyline>
          </svg>
        </a>
      </div>
      <div class="related-grid" id="related-grid">
        <!-- Dynamically filled -->
      </div>
    </div>
  </section>

  <footer class="site-footer">
    <div class="container-wide px-page" style="padding-top: 3.5rem; padding-bottom: 3.5rem;">
      <div class="footer-grid">
        <div>
          <div class="footer-logo">
            <span class="dot"></span>
            <span class="name">时间旅人</span>
          </div>
          <p class="footer-desc">在时间的褶皱里，收集那些值得被记住的瞬间。</p>
        </div>
        <div class="footer-right">
          <p class="year">© 2026</p>
          <p>以文字丈量时间</p>
        </div>
      </div>
    </div>
  </footer>

  <script src="js/main.js"></script>
</body>
</html>
