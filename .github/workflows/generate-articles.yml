name: Generate Articles JSON

# 每次 push 到 main 时自动运行
on:
  push:
    branches: [main]
    paths:
      - 'content/articles/**.md'
  # 也允许手动触发
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate articles.json
        run: python scripts/generate_articles.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/articles.json
          if git diff --cached --quiet; then
            echo "No changes to articles.json"
          else
            git commit -m "auto: 更新 articles.json"
            git push
          fi
