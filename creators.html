<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>优秀创作者 · 时间旅人</title>
  <meta name="description" content="认识时间旅人社区里的优秀创作者，以及他们留下的文字、影像与作品。">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="grain">

  <div class="cursor-dot"></div>

  <header class="site-header">
    <div class="container-wide px-page">
      <div class="site-header-inner">
        <a href="index.html" class="logo-mark" data-magnetic>
          <span class="dot"></span>
          <span class="name">时间旅人</span>
        </a>
        <nav class="site-nav">
          <a href="index.html" class="link-underline" data-magnetic>旅人志</a>
          <a href="creators.html" class="link-underline" data-magnetic>创作者</a>
          <a href="index.html#about" class="link-underline hidden-mobile" data-magnetic>关于</a>
        </nav>
      </div>
    </div>
  </header>

  <main class="creators-page">
    <section class="creators-hero">
      <div class="container-wide px-page">
        <div class="creators-hero-grid">
          <div class="reveal creators-hero-heading">
            <p class="creators-eyebrow" id="creators-hero-eyebrow">Creators / Time Traveler</p>
            <h1 class="creators-title" id="creators-hero-title">优秀创作者</h1>
          </div>
          <div class="reveal creators-hero-copy" id="creators-hero-copy" data-delay="180"></div>
        </div>
      </div>
      <div class="creators-bg-word" id="creators-bg-word" aria-hidden="true">CREATORS</div>
    </section>

    <section class="creator-manifesto">
      <div class="container-wide px-page section-pad">
        <div class="manifesto-quote reveal">
          <span class="quote-mark" aria-hidden="true">"</span>
          <p id="manifesto-text">正在加载创作者页面内容...</p>
        </div>
      </div>
    </section>

    <section class="creator-list-section">
      <div class="container-wide px-page section-pad">
        <div class="section-heading reveal">
          <p class="creators-eyebrow" id="profiles-eyebrow">Selected Profiles</p>
          <h2 id="profiles-title">创作者简介</h2>
        </div>

        <div class="creator-list" id="creator-list"></div>
      </div>
    </section>

    <section class="works-section">
      <div class="container-wide px-page section-pad">
        <div class="section-heading reveal">
          <p class="creators-eyebrow" id="works-eyebrow">Selected Works</p>
          <h2 id="works-title">部分优秀作品</h2>
        </div>

        <div class="works-grid" id="works-grid"></div>
      </div>
    </section>

    <section class="creator-join-section">
      <div class="container-wide px-page section-pad">
        <div class="join-panel reveal">
          <p class="creators-eyebrow" id="join-eyebrow">Join Us</p>
          <h2 id="join-title">也欢迎你成为时间旅人</h2>
          <p id="join-text">如果你愿意记录生活、分享作品，或只是想把某个瞬间认真留下来，这里都为你保留一个位置。</p>
          <a href="index.html#about" class="join-link" id="join-link" data-magnetic>
            <span class="link-underline" id="join-link-text">了解时间旅人</span>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="5" y1="12" x2="19" y2="12"></line>
              <polyline points="12 5 19 12 12 19"></polyline>
            </svg>
          </a>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container-wide px-page" style="padding-top: 3.5rem; padding-bottom: 3.5rem;">
      <div class="footer-grid">
        <div>
          <div class="footer-logo">
            <span class="dot"></span>
            <span class="name">时间旅人</span>
          </div>
          <p class="footer-desc">在时间的褶皱里，收集那些值得被记住的瞬间。</p>
        </div>
        <div class="footer-right">
          <p class="year">© 2026</p>
          <p>以文字丈量时间</p>
        </div>
      </div>
    </div>
  </footer>

  <script src="js/main.js"></script>
  <script>
    (function () {
      'use strict';

      var fallbackData = {
        hero: {
          eyebrow: 'Creators / Time Traveler',
          title: '优秀创作者',
          intro: [
            '这里记录那些愿意把时间写下来、画出来、拍下来的人。他们用文字、笔墨、光影和声音，为缓慢的生活留下证据。',
            '每一位创作者，都是时间旅途中的同行者。'
          ],
          backgroundWord: 'CREATORS'
        },
        manifesto: {
          number: '01',
          text: '文字是最慢的时间旅行，让过去和此刻在同一个句子里重逢。'
        },
        profilesSection: { eyebrow: 'Selected Profiles', title: '创作者简介' },
        creators: [
          { name: '墨行者', avatar: '', avatarChar: '墨', role: '文字创作者', bio: '擅长以散文记录城市、深夜与人的细微情绪。作品常在安静处发力，把普通日常写成可以反复回望的时间标本。', tags: ['随笔', '城市观察', '慢生活'] },
          { name: '山岚', avatar: '', avatarChar: '岚', role: '影像记录者', bio: '长期拍摄旅途中的晨昏、山路与无名小镇。镜头里少有宏大的风景，更多是风吹过、人经过、时间停留过。', tags: ['摄影', '旅行', '纪实'] },
          { name: '砚白', avatar: '', avatarChar: '砚', role: '笔墨创作者', bio: '用书写保存节气、梦境和旧物。她的作品不追求锋利，而更像一封慢慢展开的手写信，让人重新相信纸面的温度。', tags: ['手写', '诗句', '传统美学'] },
          { name: '川野', avatar: '', avatarChar: '川', role: '声音采集者', bio: '喜欢收集雨声、列车声、街角谈话与风穿过树叶的声音。他相信声音也是一种写作，可以替记忆保留现场。', tags: ['声音', '田野', '记忆'] }
        ],
        worksSection: { eyebrow: 'Selected Works', title: '部分优秀作品' },
        works: [
          { type: '文字 / 创作者计划', title: '时间旅人创作者计划', description: '关于表达、自由与精神栖息地的开篇宣言。', url: 'article.html?id=时间旅人创作者计划' },
          { type: '随笔 / 黎明', title: '黎明前的寂静', description: '在城市尚未苏醒前，记录第一缕光抵达之前的等待。', url: 'article.html?id=the-quiet-of-dawn' },
          { type: '旅行 / 远方', title: '来自路上的信', description: '把旅途中的距离、脚步与回望，写成一封寄给自己的信。', url: 'article.html?id=letters-from-the-road' }
        ],
        join: {
          eyebrow: 'Join Us',
          title: '也欢迎你成为时间旅人',
          text: '如果你愿意记录生活、分享作品，或只是想把某个瞬间认真留下来，这里都为你保留一个位置。',
          linkText: '了解时间旅人',
          linkUrl: 'index.html#about'
        }
      };

      function text(value, fallback) {
        return value == null || value === '' ? fallback : String(value);
      }

      function escapeHtml(value) {
        return text(value, '').replace(/[&<>"']/g, function (char) {
          return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[char];
        });
      }

      function padNumber(index) {
        return String(index + 1).padStart(2, '0');
      }

      function renderCreators(data) {
        var hero = data.hero || fallbackData.hero;
        document.getElementById('creators-hero-eyebrow').textContent = text(hero.eyebrow, fallbackData.hero.eyebrow);
        document.getElementById('creators-hero-title').textContent = text(hero.title, fallbackData.hero.title);
        document.getElementById('creators-bg-word').textContent = text(hero.backgroundWord, fallbackData.hero.backgroundWord);
        document.getElementById('creators-hero-copy').innerHTML = (hero.intro || fallbackData.hero.intro).map(function (item) {
          return '<p>' + escapeHtml(item) + '</p>';
        }).join('');

        var manifesto = data.manifesto || fallbackData.manifesto;
        document.getElementById('manifesto-text').textContent = text(manifesto.text, fallbackData.manifesto.text);

        var profilesSection = data.profilesSection || fallbackData.profilesSection;
        document.getElementById('profiles-eyebrow').textContent = text(profilesSection.eyebrow, fallbackData.profilesSection.eyebrow);
        document.getElementById('profiles-title').textContent = text(profilesSection.title, fallbackData.profilesSection.title);

        var creators = data.creators && data.creators.length ? data.creators : fallbackData.creators;
        document.getElementById('creator-list').innerHTML = creators.map(function (creator, index) {
          var tags = creator.tags || [];
          var avatarHtml;
          if (creator.avatar) {
            avatarHtml = '<div class="creator-card-avatar creator-avatar-image"><img src="' + escapeHtml(creator.avatar) + '" alt="' + escapeHtml(creator.name) + '" loading="lazy"></div>';
          } else {
            var fallbackChar = creator.avatarChar || text(creator.name, '').slice(0, 1);
            avatarHtml = '<div class="creator-card-avatar creator-avatar-char">' + escapeHtml(fallbackChar) + '</div>';
          }
          return '<a class="creator-card-v2 reveal" href="creator.html?name=' + encodeURIComponent(creator.name) + '" data-delay="' + (index * 120) + '">' +
            '<div class="creator-card-top">' + avatarHtml + '</div>' +
            '<h3>' + escapeHtml(creator.name) + '</h3>' +
            '<p class="creator-card-role">' + escapeHtml(creator.role) + '</p>' +
            '<p class="creator-card-bio">' + escapeHtml(creator.bio) + '</p>' +
            '<div class="creator-card-tags">' + tags.map(function (tag) { return '<span>' + escapeHtml(tag) + '</span>'; }).join('') + '</div>' +
            '</a>';
        }).join('');

        var worksSection = data.worksSection || fallbackData.worksSection;
        document.getElementById('works-eyebrow').textContent = text(worksSection.eyebrow, fallbackData.worksSection.eyebrow);
        document.getElementById('works-title').textContent = text(worksSection.title, fallbackData.worksSection.title);

        var works = data.works && data.works.length ? data.works : fallbackData.works;
        document.getElementById('works-grid').innerHTML = works.map(function (work, index) {
          return '<a class="work-card reveal" href="' + escapeHtml(work.url || '#') + '" data-magnetic>' +
            '<span class="work-card-type">' + escapeHtml(work.type) + '</span>' +
            '<h3>' + escapeHtml(work.title) + '</h3>' +
            '<p>' + escapeHtml(work.description) + '</p>' +
            '<span class="work-card-arrow">&rarr;</span>' +
            '</a>';
        }).join('');

        var join = data.join || fallbackData.join;
        document.getElementById('join-eyebrow').textContent = text(join.eyebrow, fallbackData.join.eyebrow);
        document.getElementById('join-title').textContent = text(join.title, fallbackData.join.title);
        document.getElementById('join-text').textContent = text(join.text, fallbackData.join.text);
        document.getElementById('join-link').setAttribute('href', text(join.linkUrl, fallbackData.join.linkUrl));
        document.getElementById('join-link-text').textContent = text(join.linkText, fallbackData.join.linkText);

        requestAnimationFrame(function () {
          if (window.initReveal) window.initReveal();
          document.querySelectorAll('.reveal:not(.revealed)').forEach(function (el) {
            el.classList.add('revealed');
          });
        });
      }

      fetch('content/creators.json?v=' + Date.now())
        .then(function (res) {
          if (!res.ok) throw new Error('无法读取创作者页面配置');
          return res.json();
        })
        .then(renderCreators)
        .catch(function () {
          renderCreators(fallbackData);
        });
    })();
  </script>
</body>
</html>
